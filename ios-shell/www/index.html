<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Contracts</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="screen">
    <img src="icon.svg" class="logo" alt="" />
    <h1>Contracts</h1>
    <p class="hint">Connect to your self-hosted server to get started.</p>

    <form id="connect-form">
      <label for="server-url">Server address</label>
      <input
        id="server-url"
        type="url"
        inputmode="url"
        autocapitalize="off"
        autocorrect="off"
        spellcheck="false"
        placeholder="https://contracts.example.com"
        required
      />
      <button type="submit">Connect</button>
    </form>

    <button id="import-cert-btn" class="secondary">Import client certificate (.p12)</button>

    <p id="status" class="status" hidden></p>
  </main>

  <script src="app.js"></script>
</body>
</html>
